<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1120">
  <title>GMAtlas</title>
  <link rel="icon" href="./assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles/tokens.css">
  <link rel="stylesheet" href="./styles/cockpit.css">
</head>
<body>
  <div id="app"></div>
  <!-- Vendored PDF.js legacy (UMD) build for the Guide's Game Mechanics
       Index (docs/adr/0014-mechanics-index-pdfjs.md) — a plain classic
       script, same reasoning as the bundle below (file:// blocks ES module
       imports; a UMD build sidesteps that entirely, no bundler involvement
       needed). Exposes window.pdfjsLib. Must load before the bundle, which
       reads it lazily (only when a scan actually runs), not eagerly. -->
  <script src="./assets/vendor/pdfjs/pdf.min.js"></script>
  <!-- Classic script bundle so the app runs by double-clicking index.html
       (browsers block ES module imports over file://). Source of truth lives in
       src/ as ES modules; run `npm run build` to regenerate this bundle. -->
  <script src="./dist/app.bundle.js"></script>
</body>
</html>
