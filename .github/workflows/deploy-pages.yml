name: Deploy to GitHub Pages

# dist/app.bundle.js and src/data/docsManifest.js are gitignored build
# artifacts (see CLAUDE.md) — this workflow builds them fresh in CI, then
# assembles ONLY the files the site actually needs into a dedicated _site/
# staging directory before publishing. Two real bugs this fixes (found via
# direct curl checks against the live site, 2026-07-04):
#
# 1) `path: .` published the ENTIRE checked-out repository to the public
#    site, not just the app — README.md, package.json, and even
#    tests/domain.test.js all served 200 from the live URL.
# 2) `dist/app.bundle.js` is listed in .gitignore, and — even though the
#    "Build bundle" step generates it fresh on disk before the upload step
#    runs — it still 404'd on the deployed site while every non-gitignored
#    file served fine. The Pages artifact upload silently excludes any path
#    matching a .gitignore pattern, gitignored-and-freshly-generated or not.
#    Since index.html's <script src="./dist/app.bundle.js"> then 404'd, the
#    app never booted (blank/black screen) — and the service worker's own
#    install-time precache list (sw.js's SHELL, which also names
#    './dist/app.bundle.js') failed for the same reason, which is why the
#    PWA install/refresh could get stuck retrying a service worker whose
#    install step could never actually succeed.
#
# Fix: assemble a clean staging directory with no path segment matching a
# .gitignore'd name (the bundle is flatted to _site/app.bundle.js, not
# _site/dist/app.bundle.js, to rule out any name-anywhere matching), copy
# in only what index.html/manifest.webmanifest/sw.js actually reference,
# and patch the two files that hardcode the old ./dist/app.bundle.js path.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run tests
        run: npm test
      - name: Build bundle
        run: node scripts/build.js
      - name: Assemble Pages site (only what's actually served)
        run: |
          set -e
          mkdir -p _site
          cp manifest.webmanifest _site/manifest.webmanifest
          cp -r styles _site/styles
          cp -r assets _site/assets
          cp dist/app.bundle.js _site/app.bundle.js
          sed 's|\./dist/app\.bundle\.js|./app.bundle.js|' index.html > _site/index.html
          sed 's|\./dist/app\.bundle\.js|./app.bundle.js|' sw.js > _site/sw.js
          touch _site/.nojekyll
          echo "--- _site contents ---"
          find _site -type f | sort
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
