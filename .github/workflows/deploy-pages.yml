name: Deploy to GitHub Pages

# dist/app.bundle.js and src/data/docsManifest.js are gitignored build
# artifacts (see CLAUDE.md) — a plain Pages deploy of the committed tree
# has no bundle at all, which is why the app was blank on GitHub but fine
# over file://. This workflow builds them in CI before publishing.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run tests
        run: npm test
      - name: Build bundle
        run: node scripts/build.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
