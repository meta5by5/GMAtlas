name: Deploy to GitHub Pages

# dist/app.bundle.js and src/data/docsManifest.js are gitignored build
# artifacts (see CLAUDE.md) — this workflow builds them fresh in CI, then
# assembles ONLY the files the site actually needs into a dedicated _site/
# staging directory before publishing. Two real bugs this fixes (found via
# direct curl checks against the live site, 2026-07-04):
#
# 1) `path: .` published the ENTIRE checked-out repository to the public
#    site, not just the app — README.md, package.json, and even
#    tests/domain.test.js all served 200 from the live URL.
# 2) `dist/app.bundle.js` is listed in .gitignore, and — even though the
#    "Build bundle" step generates it fresh on disk before the upload step
#    runs — it still 404'd on the deployed site while every non-gitignored
#    file served fine. The Pages artifact upload silently excludes any path
#    matching a .gitignore pattern, gitignored-and-freshly-generated or not.
#    Since index.html's <script src="./dist/app.bundle.js"> then 404'd, the
#    app never booted (blank/black screen) — and the service worker's own
#    install-time precache list (sw.js's SHELL, which also names
#    './dist/app.bundle.js') failed for the same reason, which is why the
#    PWA install/refresh could get stuck retrying a service worker whose
#    install step could never actually succeed.
#
# Fix: assemble a clean staging directory with no path segment matching a
# .gitignore'd name (the bundle is flatted to _site/app.bundle.js, not
# _site/dist/app.bundle.js, to rule out any name-anywhere matching), copy
# in only what index.html/manifest.webmanifest/sw.js actually reference,
# and patch the two files that hardcode the old ./dist/app.bundle.js path.
#
# A third thing, not fixable from this file: this workflow's deploys were
# silently a no-op for a while because the repo's Settings -> Pages ->
# "Build and deployment" -> Source was set to "Deploy from a branch"
# instead of "GitHub Actions" — GitHub was serving the raw main branch tree
# directly, completely bypassing this workflow's artifact regardless of
# whether it succeeded. If the live site ever again looks like it's
# ignoring a change here, check that setting first before re-debugging the
# script below.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No `lfs: true` (docs/adr/0039-reference-library-release-hosting.md,
        # 2026-07-14) — this checkout used to pull the full ~469MB of
        # assets/docs/*.pdf via Git LFS on EVERY push, which is what burned
        # the repo's monthly LFS bandwidth quota. Reference Library PDFs now
        # live in a GitHub Release instead (releaseConfig.js); this checkout
        # gets LFS pointer-stub text files at those paths, which
        # scripts/build.js's isRealFile() check correctly treats as "not
        # present," falling the manifest back to the Release URL. Do not
        # re-add lfs: true without re-reading that ADR first.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run tests
        run: npm test
      - name: Build bundle
        run: node scripts/build.js
      - name: Assemble Pages site (only what's actually served)
        run: |
          set -e
          mkdir -p _site
          cp manifest.webmanifest _site/manifest.webmanifest
          cp -r styles _site/styles
          cp -r assets _site/assets
          # assets/docs/ is LFS pointer stubs on this runner (no lfs: true
          # above, docs/adr/0039) and nothing in the app points at a local
          # assets/docs/ path on the deployed site anymore (docsManifest.js's
          # `src` field resolves to a GitHub Release URL instead) — dead
          # weight, so drop it rather than publish stub text files.
          rm -rf _site/assets/docs
          cp dist/app.bundle.js _site/app.bundle.js
          sed 's|\./dist/app\.bundle\.js|./app.bundle.js|' index.html > _site/index.html
          sed 's|\./dist/app\.bundle\.js|./app.bundle.js|' sw.js > _site/sw.js
          touch _site/.nojekyll
          find _site -type f | sort
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify the deploy actually serves the app (would have caught 2026-07-04's bugs automatically)
        run: |
          set -e
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Checking $URL"
          ok=0
          for i in 1 2 3 4 5; do
            if curl -sf "$URL" -o /tmp/live-index.html; then
              if grep -q 'app\.bundle\.js' /tmp/live-index.html; then ok=1; break; fi
            fi
            echo "attempt $i: not ready yet, retrying in 10s"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::$URL never returned a page referencing app.bundle.js"
            exit 1
          fi
          BUNDLE_URL="${URL%/}/app.bundle.js"
          code=$(curl -s -o /dev/null -w "%{http_code}" "$BUNDLE_URL")
          if [ "$code" != "200" ]; then
            echo "::error::$BUNDLE_URL returned $code (expected 200) — the app would show a black screen"
            exit 1
          fi
          # Reference Library PDFs are Release-hosted now (docs/adr/0039),
          # not served from this deploy at all — spot-check one resolves to
          # real content there instead of checking a local assets/docs/ path
          # (which is deliberately NOT published anymore, see the assemble
          # step above). The Release is confirmed live (2026-07-15) — a hard
          # failure again, same as the pre-ADR-0039 local-PDF check used to
          # be. NOTE: GitHub sanitizes an uploaded release asset's filename
          # (spaces/parens collapse to `.` — verified against the real
          # upload, see referenceLibraryManifest.js's own comment) — this
          # URL uses the asset's ACTUAL name, not the original local
          # filename naively URL-encoded.
          PDF_URL="https://github.com/meta5by5/GMAtlas/releases/download/reference-library-v1/Hostile.setting.pdf"
          if ! curl -sfL "$PDF_URL" -o /tmp/live-sample.pdf; then
            echo "::error::$PDF_URL did not download"
            exit 1
          fi
          if ! head -c 4 /tmp/live-sample.pdf | grep -q '%PDF'; then
            echo "::error::$PDF_URL is not a real PDF"
            exit 1
          fi
          echo "Reference Library Release asset verified: $PDF_URL resolves to a real PDF."
          echo "Deploy verified: $URL loads and app.bundle.js is reachable (HTTP $code)."
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
